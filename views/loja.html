<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legacy Time - Painel de Estoque</title>
    <link rel="stylesheet" href="/static/css/estilo.css">
</head>
<body>

    <header>
        <h1>LEGACY TIME - GERENCIADOR DE ESTOQUE</h1>
        <p class="subtitle">Painel Administrativo</p>
    </header>

    <div class="container">
        <section class="form-section">
            <h2>Cadastrar Novo Relógio</h2>
            <form action="/novo" method="POST" id="form-cadastro">
                <input type="text" name="nome" placeholder="Nome do Relógio" required>
                <input type="number" step="0.01" name="preco" placeholder="Preço (Ex: 1500.00)" required>
                <select name="icone">
                    <option value="⌚">⌚ Clássico</option>
                    <option value="⏱️">⏱️ Esportivo</option>
                    <option value="🕰️">🕰️ Retrô</option>
                </select>
                <button type="submit" class="btn-add">Adicionar ao Estoque</button>
            </form>
        </section>

        <section class="table-section">
            <h2>Produtos em Estoque</h2>
            <table class="crud-table">
                <thead>
                    <tr>
                        <th>Ícone</th>
                        <th>Nome</th>
                        <th>Preço</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody>
                    % for r in relogios:
                    <tr>
                        <td>{{r['icone']}}</td>
                        <td>{{r['nome']}}</td>
                        <td>R$ {{r['preco']}}</td>
                        <td>
                            <button class="btn-edit" onclick="prepararEdicao('{{r['id']}}', '{{r['nome']}}', '{{r['preco']}}')">Editar</button>
                            <a href="/deletar/{{r['id']}}" class="btn-del" onclick="return confirm('Excluir este item?')">Excluir</a>
                        </td>
                    </tr>
                    % end
                </tbody>
            </table>
        </section>
    </div>

    <div id="modal-edicao" style="display:none;" class="modal">
        <div class="modal-content">
            <h3>Editar Relógio</h3>
            <form action="/editar" method="POST">
                <input type="hidden" name="id" id="edit-id">
                <input type="text" name="nome" id="edit-nome" required>
                <input type="number" step="0.01" name="preco" id="edit-preco" required>
                <button type="submit" class="btn-add">Salvar Alterações</button>
                <button type="button" class="btn-del" onclick="fecharEdicao()">Cancelar</button>
            </form>
        </div>
    </div>

    <script src="/static/js/script.js"></script>
</body>
</html>
